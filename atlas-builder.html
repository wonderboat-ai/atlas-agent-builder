<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATLAS · Construtor de Agentes</title>
<style>
  :root{
    --ink:#070a10; --ink-2:#0d1219; --ink-3:#121821; --ink-4:#18202b;
    --line:rgba(255,255,255,.09); --line-2:rgba(255,255,255,.05);
    --brass:#2fe0cf; --brass-dim:#1f9b90;
    --steel:#7c6cff; --steel-dim:#4a3fa0;
    --text:#e9eef6; --muted:#aab4c2; --faint:#7b8494;
    --ok:#74c78c; --red:#e0726c;
    --glow:rgba(47,224,207,.35);
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --r:9px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--ink);color:var(--text);font-family:var(--sans);
    font-size:14px;line-height:1.5;
    background-image:linear-gradient(var(--line-2) 1px,transparent 1px),linear-gradient(90deg,var(--line-2) 1px,transparent 1px);
    background-size:44px 44px;background-position:-1px -1px;
  }
  button{font-family:inherit;cursor:pointer}
  ::selection{background:var(--brass);color:var(--ink)}
  :focus-visible{outline:2px solid var(--brass);outline-offset:2px}

  /* ---- shell ---- */
  .top{display:flex;align-items:center;gap:16px;padding:14px 22px;border-bottom:1px solid var(--line);background:rgba(20,23,29,.85);backdrop-filter:blur(8px);position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:baseline;gap:10px}
  .brand b{font-family:var(--mono);font-size:15px;letter-spacing:.22em;font-weight:600;color:var(--brass)}
  .brand span{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint)}
  .top .sp{flex:1}
  .tbtn{background:var(--ink-3);border:1px solid var(--line);color:var(--text);padding:7px 13px;border-radius:var(--r);font-size:12.5px;font-family:var(--mono);letter-spacing:.04em;transition:.15s}
  .tbtn:hover{border-color:var(--brass-dim);color:#fff}
  .tbtn.ghost{background:transparent;color:var(--muted)}

  .app{display:grid;grid-template-columns:236px minmax(0,1fr) 392px;min-height:calc(100vh - 57px)}

  /* ---- rail ---- */
  .rail{border-right:1px solid var(--line);padding:24px 0;position:relative}
  .rail .pgl{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);padding:0 24px 14px}
  .ladder{position:relative;padding:0 14px}
  .step{display:flex;align-items:center;gap:13px;width:100%;background:none;border:0;text-align:left;padding:9px 10px;border-radius:var(--r);color:var(--muted);position:relative;transition:.15s}
  .step:hover{background:var(--ink-2);color:var(--text)}
  .step.active{background:var(--ink-3);color:#fff}
  .step.active .mk{border-color:var(--brass);color:var(--brass);box-shadow:0 0 0 4px rgba(232,182,106,.12)}
  .mk{flex:none;width:30px;height:30px;border-radius:8px;border:1.5px solid var(--line);display:grid;place-items:center;font-family:var(--mono);font-size:13px;font-weight:600;color:var(--faint);background:var(--ink);transition:.2s;z-index:2}
  .step.done .mk{border-color:var(--steel-dim);color:var(--steel);background:rgba(111,168,199,.06)}
  .step.done.active .mk{border-color:var(--brass);color:var(--brass)}
  .slabel{display:flex;flex-direction:column;line-height:1.25}
  .slabel b{font-size:13px;font-weight:600}
  .slabel small{font-size:10.5px;color:var(--faint);font-family:var(--mono);letter-spacing:.04em}
  .step.opt .slabel b{font-weight:500}
  .conn{position:absolute;left:29px;top:0;bottom:0;width:1.5px;background:var(--line);z-index:1}
  .prog{margin:22px 24px 0;border-top:1px solid var(--line);padding-top:16px}
  .bar{height:4px;background:var(--ink-3);border-radius:3px;overflow:hidden}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--steel),var(--brass));transition:.4s}
  .prog small{font-family:var(--mono);font-size:10.5px;color:var(--faint);display:block;margin-top:8px;letter-spacing:.05em}

  /* ---- main ---- */
  .main{padding:34px 44px;max-width:760px;width:100%}
  .eyebrow{display:flex;align-items:center;gap:11px;margin-bottom:6px}
  .eyebrow .big{width:42px;height:42px;border-radius:9px;border:1.5px solid var(--brass);color:var(--brass);display:grid;place-items:center;font-family:var(--mono);font-size:19px;font-weight:600}
  .eyebrow em{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);font-style:normal}
  h1{font-size:25px;margin:.1em 0 .15em;letter-spacing:-.01em}
  .sub{color:var(--muted);margin:0 0 4px;max-width:60ch}
  .guide{margin:18px 0 26px;border:1px solid var(--line);border-left:2px solid var(--steel-dim);border-radius:var(--r);background:var(--ink-2);padding:12px 15px;font-size:12.5px;color:var(--muted)}
  .guide b{color:var(--steel);font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;margin-right:6px}
  .guide .err b{color:var(--red)}

  .field{margin-bottom:22px}
  label.lab{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
  label.lab .hint{text-transform:none;letter-spacing:0;color:var(--faint);font-family:var(--sans);font-size:11.5px;margin-left:8px}
  input[type=text],textarea,select{width:100%;background:var(--ink-3);border:1px solid var(--line);color:var(--text);border-radius:var(--r);padding:10px 12px;font-family:inherit;font-size:13.5px;transition:.15s}
  textarea{resize:vertical;min-height:64px;line-height:1.5}
  input:focus,textarea:focus,select:focus{border-color:var(--brass-dim);background:var(--ink-4)}
  input::placeholder,textarea::placeholder{color:var(--faint)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

  /* tags */
  .tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px}
  .tag{display:inline-flex;align-items:center;gap:7px;background:var(--ink-4);border:1px solid var(--line);border-radius:20px;padding:4px 6px 4px 12px;font-size:12.5px}
  .tag.red{border-color:var(--red);color:#f0b3af}
  .tag button{background:none;border:0;color:var(--faint);font-size:15px;line-height:1;padding:0 2px}
  .tag button:hover{color:var(--red)}

  /* repeatable cards */
  .cards{display:flex;flex-direction:column;gap:11px}
  .card{border:1px solid var(--line);border-radius:var(--r);background:var(--ink-2);padding:13px 13px 4px;position:relative}
  .card .x{position:absolute;top:9px;right:9px;background:none;border:0;color:var(--faint);font-size:16px;line-height:1}
  .card .x:hover{color:var(--red)}
  .card .idx{font-family:var(--mono);font-size:10.5px;color:var(--faint);letter-spacing:.1em}
  .ord{display:flex;flex-direction:column;gap:2px;position:absolute;top:10px;right:34px}
  .ord button{background:var(--ink-3);border:1px solid var(--line);color:var(--muted);width:20px;height:17px;border-radius:4px;font-size:9px;line-height:1;padding:0}
  .ord button:hover{color:var(--brass);border-color:var(--brass-dim)}
  .add{background:transparent;border:1px dashed var(--line);color:var(--muted);border-radius:var(--r);padding:10px;width:100%;font-family:var(--mono);font-size:12px;letter-spacing:.04em;transition:.15s}
  .add:hover{border-color:var(--brass-dim);color:var(--brass)}

  .checks{display:flex;flex-wrap:wrap;gap:8px}
  .chk{display:flex;align-items:center;gap:9px;border:1px solid var(--line);background:var(--ink-2);border-radius:var(--r);padding:8px 12px;font-size:12.5px;color:var(--muted);cursor:pointer;transition:.12s}
  .chk:hover{border-color:var(--brass-dim)}
  .chk.on{border-color:var(--brass);color:#fff;background:rgba(232,182,106,.08)}
  .chk .dot{width:13px;height:13px;border-radius:4px;border:1.5px solid var(--faint)}
  .chk.on .dot{background:var(--brass);border-color:var(--brass)}

  .radio{display:flex;gap:10px}
  .radio .opt{flex:1;border:1px solid var(--line);background:var(--ink-2);border-radius:var(--r);padding:12px 14px;cursor:pointer;transition:.12s}
  .radio .opt:hover{border-color:var(--brass-dim)}
  .radio .opt.on{border-color:var(--brass);background:rgba(232,182,106,.08)}
  .radio .opt b{display:block;font-size:13px;margin-bottom:2px}
  .radio .opt small{color:var(--faint);font-size:11.5px}

  .viab{display:flex;flex-direction:column;gap:8px;margin-top:6px}
  .verdict{margin-top:12px;font-family:var(--mono);font-size:12px;padding:10px 13px;border-radius:var(--r);letter-spacing:.03em}
  .verdict.go{background:rgba(116,199,140,.1);border:1px solid var(--ok);color:var(--ok)}
  .verdict.no{background:rgba(224,114,108,.1);border:1px solid var(--red);color:#f0b3af}

  .nav{display:flex;justify-content:space-between;margin-top:38px;padding-top:20px;border-top:1px solid var(--line)}
  .nav button{padding:10px 20px;border-radius:var(--r);font-size:13px;font-family:var(--mono);letter-spacing:.04em;border:1px solid var(--line);background:var(--ink-3);color:var(--text)}
  .nav button.prim{background:var(--brass);color:var(--ink);border-color:var(--brass);font-weight:600}
  .nav button.prim:hover{background:#f0c684}
  .nav button:disabled{opacity:.35;cursor:default}

  /* ---- preview ---- */
  .prev{border-left:1px solid var(--line);background:var(--ink-2);display:flex;flex-direction:column;position:sticky;top:57px;height:calc(100vh - 57px)}
  .prev .ph{display:flex;align-items:center;gap:6px;padding:12px 16px;border-bottom:1px solid var(--line)}
  .prev .ph em{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);font-style:normal;margin-right:auto}
  .seg{display:flex;background:var(--ink);border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .seg button{background:none;border:0;color:var(--muted);font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;padding:5px 10px}
  .seg button.on{background:var(--ink-4);color:var(--brass)}
  .prev pre{flex:1;overflow:auto;margin:0;padding:16px 18px;font-family:var(--mono);font-size:11.5px;line-height:1.65;color:#cdd2da;white-space:pre-wrap;word-break:break-word}
  .prev pre .hh{color:var(--brass)}
  .prev .pf{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--line)}
  .prev .pf button{flex:1;background:var(--ink-3);border:1px solid var(--line);color:var(--text);border-radius:var(--r);padding:9px;font-family:var(--mono);font-size:11.5px;letter-spacing:.04em}
  .prev .pf button:hover{border-color:var(--brass-dim);color:var(--brass)}
  .prev .pf button.prim{background:var(--brass);color:var(--ink);border-color:var(--brass);font-weight:600}

  .pvtoggle{display:none}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink-4);border:1px solid var(--brass-dim);color:var(--brass);font-family:var(--mono);font-size:12px;padding:10px 18px;border-radius:8px;opacity:0;transition:.25s;pointer-events:none;z-index:50;letter-spacing:.04em}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (max-width:1080px){
    .app{grid-template-columns:200px 1fr}
    .prev{position:fixed;top:0;right:0;width:min(440px,90vw);height:100vh;z-index:30;transform:translateX(100%);transition:.3s;box-shadow:-20px 0 50px rgba(0,0,0,.4)}
    .prev.open{transform:none}
    .pvtoggle{display:inline-flex}
  }
  @media (max-width:680px){
    .app{grid-template-columns:1fr}
    .rail{position:fixed;top:57px;left:0;bottom:0;width:200px;background:var(--ink);z-index:25;transform:translateX(-100%);transition:.3s;border-right:1px solid var(--line)}
    .rail.open{transform:none}
    .main{padding:24px 20px}
    .menutoggle{display:inline-flex!important}
    .row2,.row3{grid-template-columns:1fr}
  }
  .menutoggle{display:none}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <div class="top">
    <button class="tbtn ghost menutoggle" id="menuBtn" aria-label="Menu de fases">☰</button>
    <div class="brand"><b>ATLAS</b><span>Construtor de Agentes · v1.0</span></div>
    <div class="sp"></div>
    <button class="tbtn ghost" id="exBtn" title="Carregar exemplo">Exemplo</button>
    <button class="tbtn" id="impBtn">Importar</button>
    <button class="tbtn" id="jsonBtn">Exportar .json</button>
    <button class="tbtn ghost pvtoggle" id="pvBtn" aria-label="Ver preview">Preview</button>
    <input type="file" id="fileIn" accept="application/json" hidden>
  </div>

  <div class="app">
    <nav class="rail" id="rail"></nav>
    <main class="main" id="main"></main>
    <aside class="prev" id="prev">
      <div class="ph">
        <em>Saída ao vivo</em>
        <div class="seg" id="seg">
          <button data-v="montagem" class="on">Montagem</button>
          <button data-v="modular">Modular</button>
        </div>
      </div>
      <pre id="pvText"></pre>
      <div class="pf">
        <button id="copyBtn">Copiar</button>
        <button class="prim" id="mdBtn">Exportar .md</button>
      </div>
    </aside>
  </div>
  <div class="toast" id="toast"></div>

<script>
"use strict";

/* ---------------- state ---------------- */
const blank = () => ({
  nome:"",
  mandato:{existePara:"",atende:"",naoFaz:"",tipo:"dedicado",dentro:[],fora:[],metrica:"",
           v_decisao:false,v_planejar:false,v_autonomia:false},
  consti:{valores:[],vermelhas:[],lente:"",casos:[],postura:""},
  voz:{assinatura:[],banidas:[],ritmo:"",canais:[],retoricos:[],pares:[]},
  sist:{modeloBase:"",modeloEcon:"",skills:[],ferramentas:[]},
  cont:{entidade:"",rag:false,ragFonte:"",estado:[],politica:""},
  oper:{guardrails:[],deriva:[],metricas:[]},
  orq:{modo:"unico",protocolos:[],multimodal:false,notas:""},
  gov:{mae:"",versao:"1.0",dono:"",etica:false,kpis:""}
});
let S = blank();
let step = 0;
let pvMode = "montagem";

/* ---------------- steps config ---------------- */
const STEPS = [
  {mk:"0",label:"Mandato",sub:"viabilidade",opt:false,
   done:s=>s.nome && s.mandato.existePara && s.mandato.metrica},
  {mk:"A",label:"Alma",sub:"a alma",opt:false,
   done:s=>s.consti.valores.length>=2 && s.consti.vermelhas.length>=3 && s.consti.lente && s.consti.casos.length>=1},
  {mk:"T",label:"Tom",sub:"a voz",opt:false,
   done:s=>s.voz.assinatura.length>=1 && s.voz.pares.length>=2},
  {mk:"L",label:"Lembrança",sub:"memória",opt:false,
   done:s=>s.cont.entidade && s.cont.politica},
  {mk:"A",label:"Aptidões",sub:"habilidades",opt:false,
   done:s=>s.sist.skills.length>=1},
  {mk:"S",label:"Salvaguardas",sub:"validação",opt:false,
   done:s=>s.oper.guardrails.length>=1 && s.oper.deriva.length>=1},
  {mk:"+",label:"Escala",sub:"orq. + gov.",opt:true,
   done:s=>s.gov.mae||s.orq.modo==="multi"},
  {mk:"↓",label:"Exportar",sub:"montagem",opt:false,
   done:s=>false},
];

/* ---------------- helpers ---------------- */
const $ = (s,el=document)=>el.querySelector(s);
const esc = t => (t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const slug = t => (t||"agente").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1800);}

/* field builders (return HTML strings; bound after render) */
function txt(path,ph,val){return `<input type="text" data-path="${path}" placeholder="${esc(ph)}" value="${esc(val||"")}">`;}
function area(path,ph,val){return `<textarea data-path="${path}" placeholder="${esc(ph)}">${esc(val||"")}</textarea>`;}

function tagsField(arr,listKey,ph,red){
  const chips = arr.map((t,i)=>`<span class="tag ${red?'red':''}">${esc(t)}<button data-tagdel="${listKey}" data-i="${i}">×</button></span>`).join("");
  return `<div class="tags">${chips}</div><input type="text" data-tagadd="${listKey}" placeholder="${esc(ph)}  ⏎">`;
}

/* ---------------- render ---------------- */
function render(){ renderRail(); renderMain(); renderPreview(); }

function renderRail(){
  const r = $("#rail");
  let h = `<div class="pgl">Camadas</div><div class="ladder"><div class="conn"></div>`;
  STEPS.forEach((st,i)=>{
    const done = st.done(S);
    h += `<button class="step ${i===step?'active':''} ${done?'done':''} ${st.opt?'opt':''}" data-step="${i}">
      <span class="mk">${st.mk}</span>
      <span class="slabel"><b>${st.label}</b><small>${st.sub}</small></span></button>`;
  });
  h += `</div>`;
  const reqDone = STEPS.filter(s=>!s.opt && s.mk!=="↓").filter(s=>s.done(S)).length;
  const reqTot = STEPS.filter(s=>!s.opt && s.mk!=="↓").length;
  const pct = Math.round(reqDone/reqTot*100);
  h += `<div class="prog"><div class="bar"><i style="width:${pct}%"></i></div><small>${reqDone}/${reqTot} camadas prontas · ${pct}%</small></div>`;
  r.innerHTML = h;
  r.querySelectorAll(".step").forEach(b=>b.onclick=()=>{step=+b.dataset.step;render();closeMenus();});
}

function head(mk,eyebrow,title,sub,pronto,erro){
  return `<div class="eyebrow"><span class="big">${mk}</span><em>${eyebrow}</em></div>
    <h1>${title}</h1><p class="sub">${sub}</p>
    ${pronto?`<div class="guide"><b>Pronto quando</b>${pronto}<br><span class="err"><b>Erro comum</b>${erro}</span></div>`:""}`;
}

function renderMain(){
  const m = $("#main");
  let h = "";
  switch(step){
    case 0: h = head("0","Fase 0","Mandato + Viabilidade","Decida se vale um agente — e defina o que ele é antes de escrever uma linha.",
      "alguém lê a ficha e diz, sem ajuda, o que o agente recusaria.",
      "começar pela voz antes do mandato. Voz sem mandato é maquiagem.")
      + `<div class="field"><label class="lab">Nome do agente</label>${txt("nome","Ex.: Triador de Suporte N1",S.nome)}</div>
      <div class="field"><label class="lab">Mandato <span class="hint">a frase de uma linha</span></label>
        <div class="row3">${txt("mandato.existePara","existe para…",S.mandato.existePara)}${txt("mandato.atende","atende…",S.mandato.atende)}${txt("mandato.naoFaz","e não faz…",S.mandato.naoFaz)}</div></div>
      <div class="field"><label class="lab">Tipo de instância</label>
        <div class="radio">
          <div class="opt ${S.mandato.tipo==='dedicado'?'on':''}" data-radio="mandato.tipo" data-val="dedicado"><b>Dedicado</b><small>memória por-entidade (1 por usuário/conta)</small></div>
          <div class="opt ${S.mandato.tipo==='compartilhado'?'on':''}" data-radio="mandato.tipo" data-val="compartilhado"><b>Compartilhado</b><small>serve muitos, sem memória individual</small></div>
        </div></div>
      <div class="row2">
        <div class="field"><label class="lab">Escopo — dentro</label>${tagsField(S.mandato.dentro,"mandato.dentro","o que ele faz")}</div>
        <div class="field"><label class="lab">Escopo — fora</label>${tagsField(S.mandato.fora,"mandato.fora","o que está fora",true)}</div>
      </div>
      <div class="field"><label class="lab">Métrica de sucesso <span class="hint">uma só, dura</span></label>${txt("mandato.metrica","Ex.: % de chamados resolvidos sem humano",S.mandato.metrica)}</div>
      <div class="field"><label class="lab">Filtro de viabilidade <span class="hint">agente só vale se…</span></label>
        <div class="viab">
          <label class="chk ${S.mandato.v_decisao?'on':''}" data-toggle="mandato.v_decisao"><span class="dot"></span>Há decisão complexa ou regra difícil de manter</label>
          <label class="chk ${S.mandato.v_planejar?'on':''}" data-toggle="mandato.v_planejar"><span class="dot"></span>O sistema precisa planejar (qual ferramenta / próximo passo)</label>
          <label class="chk ${S.mandato.v_autonomia?'on':''}" data-toggle="mandato.v_autonomia"><span class="dot"></span>A organização tolera autonomia neste fluxo</label>
        </div>${viabVerdict()}</div>`;
      break;

    case 1: h = head("A","Camada A","Alma","O núcleo de critério invariante. O que o agente prioriza sob conflito e o que recusa sob pressão.",
      "dois casos inéditos resolvidos por pessoas diferentes batem com o que a constituição prevê.",
      "lista plana de valores. Sem ordem, todo conflito vira improviso.")
      + `<div class="field"><label class="lab">Hierarquia de valores <span class="hint">a ordem resolve o conflito sozinha</span></label>${orderedField(S.consti.valores,"consti.valores","Ex.: veracidade")}</div>

    case 3: h = head("L","Camada L","Lembrança","O que faz o agente persistir, não só repetir. Memória (o que sei) ≠ estado (onde estou).",

/* ordered list (value hierarchy) */
function orderedField(arr,key,ph){
  const items = arr.map((v,i)=>`<div class="card"><span class="idx">${i+1}.</span> ${esc(v)}
    <div class="ord"><button data-up="${key}" data-i="${i}" ${i===0?'disabled':''}>▲</button><button data-down="${key}" data-i="${i}" ${i===arr.length-1?'disabled':''}>▼</button></div>
    <button class="x" data-tagdel="${key}" data-i="${i}">×</button></div>`).join("");
  return `<div class="cards" style="margin-bottom:10px">${items}</div><input type="text" data-tagadd="${key}" placeholder="${esc(ph)}  ⏎">`;
}

/* repeatable object cards */
function cardsField(key,arr,fields){
  const cards = arr.map((row,i)=>{
    const inner = fields.map(([f,ph])=>{
      const long = /proc|restr|notas|esperado|tentativa|decisao|porque|situacao|naVoz|generico/.test(f);
      return long
        ? `<div class="field" style="margin-bottom:10px"><label class="lab">${esc(ph)}</label><textarea data-card="${key}" data-i="${i}" data-f="${f}" style="min-height:48px">${esc(row[f]||"")}</textarea></div>`
        : `<div class="field" style="margin-bottom:10px"><label class="lab">${esc(ph)}</label><input type="text" data-card="${key}" data-i="${i}" data-f="${f}" value="${esc(row[f]||"")}"></div>`;
    }).join("");
    return `<div class="card"><span class="idx">#${i+1}</span><button class="x" data-carddel="${key}" data-i="${i}">×</button><div style="margin-top:8px">${inner}</div></div>`;
  }).join("");
  return `<div class="cards">${cards}</div><button class="add" data-cardadd="${key}" style="margin-top:11px">+ adicionar</button>`;
}

function toolsField(){
  const arr = S.sist.ferramentas;
  const cards = arr.map((t,i)=>`<div class="card"><span class="idx">#${i+1}</span><button class="x" data-carddel="sist.ferramentas" data-i="${i}">×</button>
    <div style="margin-top:8px">
      <div class="field" style="margin-bottom:10px"><label class="lab">Nome</label><input type="text" data-card="sist.ferramentas" data-i="${i}" data-f="nome" value="${esc(t.nome||"")}"></div>
      <div class="row3">
        <div class="field" style="margin-bottom:10px"><label class="lab">Tipo</label><select data-card="sist.ferramentas" data-i="${i}" data-f="tipo">
          <option ${t.tipo==='dados'?'selected':''}>dados</option><option ${t.tipo==='ação'?'selected':''}>ação</option><option ${t.tipo==='orquestração'?'selected':''}>orquestração</option></select></div>
        <div class="field" style="margin-bottom:10px"><label class="lab">Risco</label><select data-card="sist.ferramentas" data-i="${i}" data-f="risco">
          <option ${t.risco==='baixo'?'selected':''}>baixo</option><option ${t.risco==='médio'?'selected':''}>médio</option><option ${t.risco==='alto'?'selected':''}>alto</option></select></div>
        <div class="field" style="margin-bottom:10px;display:flex;align-items:flex-end"><label class="chk ${t.idem?'on':''}" data-cardtoggle="sist.ferramentas" data-i="${i}" data-f="idem" style="width:100%"><span class="dot"></span>Idempotente</label></div>

function checksField(key,opts){
  const sel = key.split(".").reduce((o,k)=>o[k],S);
  return `<div class="checks">${opts.map(o=>`<label class="chk ${sel.includes(o)?'on':''}" data-check="${key}" data-val="${esc(o)}"><span class="dot"></span>${esc(o)}</label>`).join("")}</div>`;
}

function viabVerdict(){
  const v = S.mandato;
  if(!v.v_decisao && !v.v_planejar && !v.v_autonomia) return "";
  const go = (v.v_decisao||v.v_planejar) && v.v_autonomia;
  return go
    ? `<div class="verdict go">✓ Caso adequado para agente — siga.</div>`
    : `<div class="verdict no">⚠ Reavalie: entrada previsível ou baixa autonomia → um fluxo determinístico pode ser melhor que um agente.</div>`;
}

function exportSummary(){
  const checks = STEPS.filter(s=>!s.opt && s.mk!=="↓").map(s=>`<label class="chk ${s.done(S)?'on':''}"><span class="dot"></span>${s.mk} · ${s.label}</label>`).join("");
  return `<div class="field"><label class="lab">Camadas obrigatórias</label><div class="checks">${checks}</div></div>
    <div class="guide"><b>Lei 1</b>Os arquivos saem modulares — alma, voz e ferramenta em blocos separados. A "Montagem" é a visão consolidada para runtime e auditoria, não o formato de manutenção.</div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="add" id="mdBtn2" style="border-style:solid;border-color:var(--brass-dim);color:var(--brass)">⤓ Exportar Markdown (ficha + módulos)</button>
      <button class="add" id="jsonBtn2" style="border-style:solid">⤓ Exportar JSON (re-importável)</button>
    </div>`;
}

/* ---------------- bindings ---------------- */
function bind(scope){
  scope.querySelectorAll("[data-path]").forEach(el=>{
    el.oninput=()=>{ setPath(el.dataset.path, el.value); softRefresh(); };
  });
  scope.querySelectorAll("[data-radio]").forEach(el=>{
    el.onclick=()=>{ setPath(el.dataset.radio, el.dataset.val); render(); };
  });
  scope.querySelectorAll("[data-toggle]").forEach(el=>{
    el.onclick=(e)=>{ e.preventDefault(); const p=el.dataset.toggle; setPath(p,!getPath(p)); render(); };
  });
  scope.querySelectorAll("[data-tagadd]").forEach(el=>{
    el.onkeydown=(e)=>{ if(e.key==="Enter"&&el.value.trim()){ getPath(el.dataset.tagadd).push(el.value.trim()); el.value=""; render(); focusAttr("data-tagadd",el.dataset.tagadd);} };
  });
  scope.querySelectorAll("[data-tagdel]").forEach(el=>{
    el.onclick=()=>{ getPath(el.dataset.tagdel).splice(+el.dataset.i,1); render(); };
  });
  scope.querySelectorAll("[data-up]").forEach(el=>{ el.onclick=()=>{const a=getPath(el.dataset.up),i=+el.dataset.i;[a[i-1],a[i]]=[a[i],a[i-1]];render();};});
  scope.querySelectorAll("[data-down]").forEach(el=>{ el.onclick=()=>{const a=getPath(el.dataset.down),i=+el.dataset.i;[a[i+1],a[i]]=[a[i],a[i+1]];render();};});
  scope.querySelectorAll("[data-cardadd]").forEach(el=>{
    el.onclick=()=>{ getPath(el.dataset.cardadd).push({}); render(); };
  });
  scope.querySelectorAll("[data-carddel]").forEach(el=>{
    el.onclick=()=>{ getPath(el.dataset.carddel).splice(+el.dataset.i,1); render(); };
  });
  scope.querySelectorAll("[data-card]").forEach(el=>{
    const upd=()=>{ getPath(el.dataset.card)[+el.dataset.i][el.dataset.f]=el.value; softRefresh(); };
    el.oninput=upd; el.onchange=upd;
  });
  scope.querySelectorAll("[data-cardtoggle]").forEach(el=>{
    el.onclick=(e)=>{ e.preventDefault(); const row=getPath(el.dataset.cardtoggle)[+el.dataset.i]; row[el.dataset.f]=!row[el.dataset.f]; render(); };
  });
  scope.querySelectorAll("[data-check]").forEach(el=>{
    el.onclick=()=>{ const a=getPath(el.dataset.check),v=el.dataset.val,k=a.indexOf(v); k<0?a.push(v):a.splice(k,1); render(); };
  });
  const nx=$("#next",scope),pv=$("#prev",scope);
  if(nx)nx.onclick=()=>{ if(step<STEPS.length-1){step++;render();window.scrollTo(0,0);} };
  if(pv)pv.onclick=()=>{ if(step>0){step--;render();window.scrollTo(0,0);} };
  const md2=$("#mdBtn2",scope),js2=$("#jsonBtn2",scope);
  if(md2)md2.onclick=exportMd; if(js2)js2.onclick=exportJson;
}
function focusAttr(attr,val){const el=document.querySelector(`[${attr}="${val}"]`);if(el)el.focus();}

function setPath(path,val){ const ks=path.split("."); let o=S; for(let i=0;i<ks.length-1;i++)o=o[ks[i]]; o[ks[ks.length-1]]=val; }
function getPath(path){ return path.split(".").reduce((o,k)=>o[k],S); }
function softRefresh(){ renderRail(); renderPreview(); }

  o+=f("alma.md",`# Alma\n## Valores (ordenados)\n${c.valores.map((x,i)=>`${i+1}. ${x}`).join("\n")}\n## Linhas vermelhas\n${c.vermelhas.map(x=>`- ${x}`).join("\n")}\n## Lente\n${c.lente}\n## Casos de julgamento\n${c.casos.map(x=>`- ${x.situacao} → ${x.decisao} (${x.porque})`).join("\n")}\n## Postura sob pressão\n${c.postura}`);
  o+=f("tom.md",`# Tom\nAssinatura: ${v.assinatura.join(", ")}\nBanidas: ${v.banidas.join(", ")}\nRitmo: ${v.ritmo}\nRecursos: ${v.retoricos.join(", ")}\n## Pares antes/depois\n${v.pares.map(x=>`- "${x.generico}" → "${x.naVoz}"`).join("\n")}`);
  o+=f("lembranca.md",`# Lembrança\nEntidade: ${m.cont.entidade}\nRAG: ${m.cont.rag?m.cont.ragFonte||"sim":"não"}\nEstado: ${m.cont.estado.join(", ")}\nPolítica: ${m.cont.politica}`);
  m.sist.skills.forEach(k=>o+=f(`aptidoes/${slug(k.nome||"skill")}.md`,`# SKILL — ${k.nome}\nGatilho: ${k.gatilho}\nProcedimento: ${k.proc}\nRestrições: ${k.restr}`));
  o+=f("salvaguardas.md",`# Salvaguardas\nGuardrails: ${m.oper.guardrails.join(", ")}\nMétricas: ${m.oper.metricas.join(", ")}\n## Deriva\n${m.oper.deriva.map(x=>`- ${x.tentativa} → ${x.esperado}`).join("\n")}`);
  return o;
}
function renderPreview(){
  const out = pvMode==="montagem" ? buildMontagem() : buildModular();
  $("#pvText").innerHTML = esc(out).replace(/^(#+ .+)$/gm,'<span class="hh">$1</span>').replace(/(━━━ FILE: .+ ━━━)/g,'<span class="hh">$1</span>');
}

/* ---------------- io ---------------- */
function download(name,text,type){
  const b=new Blob([text],{type});const u=URL.createObjectURL(b);const a=document.createElement("a");
  a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);
}
function exportJson(){ download(`${slug(S.nome)}.atlas.json`, JSON.stringify(S,null,2), "application/json"); toast("JSON exportado"); }
function exportMd(){
  const md = `# ${S.nome||"Agente"} — Ficha ATLAS\n_Gerado pelo Construtor ATLAS_\n\n## ▖ MONTAGEM (runtime)\n\n\`\`\`\n${buildMontagem()}\`\`\`\n\n## ▖ ARQUIVOS MODULARES (manutenção)\n\n\`\`\`\n${buildModular()}\`\`\`\n`;
  download(`${slug(S.nome)}.atlas.md`, md, "text/markdown"); toast("Markdown exportado");
}

/* ---------------- top bar ---------------- */
$("#exBtn").onclick=loadExample;
$("#jsonBtn").onclick=exportJson;
$("#mdBtn").onclick=exportMd;
$("#copyBtn").onclick=()=>{const t=pvMode==="montagem"?buildMontagem():buildModular();navigator.clipboard.writeText(t).then(()=>toast("Copiado")).catch(()=>toast("Copie manualmente"));};
$("#impBtn").onclick=()=>$("#fileIn").click();
$("#fileIn").onchange=(e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{S=Object.assign(blank(),JSON.parse(r.result));step=0;render();toast("Importado");}catch{toast("Arquivo inválido");}};r.readAsText(f);e.target.value="";};
$("#seg").querySelectorAll("button").forEach(b=>b.onclick=()=>{pvMode=b.dataset.v;$("#seg").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b));renderPreview();});
$("#pvBtn").onclick=()=>$("#prev").classList.toggle("open");
$("#menuBtn").onclick=()=>$("#rail").classList.toggle("open");
function closeMenus(){$("#rail").classList.remove("open");}

render();
